name: Sjekk vielsestider

on:
  schedule:
    # Kjører kl. 22:15 norsk tid (20:15 UTC) for testing
    - cron: "15 20 * * *"
  workflow_dispatch: # Kan også kjøres manuelt fra GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install requests python-dotenv

      - name: Kjør vielse-sjekk
        env:
          VIELSE_EMAIL_FROM: ${{ secrets.VIELSE_EMAIL_FROM }}
          VIELSE_EMAIL_PASSWORD: ${{ secrets.VIELSE_EMAIL_PASSWORD }}
          VIELSE_SMTP_SERVER: smtp.gmail.com
          VIELSE_SMTP_PORT: "465"
        run: python main.py
